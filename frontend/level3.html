<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture - Words</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-gray-50 flex flex-col min-h-screen">

    <!-- Navbar -->
    <header class="navbar">
        <div class="container navbar-content">
            <a href="home.html" class="back-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Levels
            </a>
            <span class="logo mx-auto">Gesture</span>
            <div style="width: 100px;" id="progress-indicator" class="font-bold text-muted">Word 1 / 15</div>
        </div>
    </header>

    <!-- Main Content Split Screen -->
    <main class="split-layout container page-content">

        <!-- Left Side: Learning Panel -->
        <div class="learning-panel fade-in">
            <div class="letter-display-container">
                <h1 id="learning-word" class="massive-letter">No</h1>
            </div>

            <div class="instruction-card">
                <div class="instruction-img-container">
                    <!-- Video Demonstration for Words -->
                    <video id="learning-video" class="instruction-img" autoplay loop muted playsinline>
                        <source src="videos/no.mp4" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>
                <div class="instruction-text-container">
                    <h2 class="instruction-title">How to sign:</h2>
                    <p id="learning-instruction" class="instruction-desc">Bring your index and middle fingers down to touch your thumb.</p>
                </div>
            </div>

            <!-- Shown only at the end -->
            <div id="finish-container" class="hidden finish-container text-center mt-4">
                <h2>Congratulations! You learned all the words!</h2>
                <a href="home.html" class="btn btn-primary btn-lg mt-2">Back to Levels</a>
            </div>
        </div>

        <!-- Right Side: Webcam Panel -->
        <div class="webcam-panel fade-in delay-1">
            <div class="test-container" style="max-width: 100%;">
                <div class="video-wrapper">
                    <!-- Webcam Video -->
                    <video id="webcam-video" autoplay playsinline muted></video>
                    <div id="video-overlay" class="video-overlay">
                        <p id="camera-status">Initializing webcam...</p>
                    </div>
                </div>

                <div class="feedback-area">
                    <div class="detection-status">
                        Detected Word: <strong id="detected-word" class="detected-letter-text">-</strong>
                        <span id="match-feedback" class="match-feedback"></span>
                    </div>

                    <button id="btn-next-word" class="btn btn-primary btn-lg mt-2" onclick="nextWord()">
                        Next Word &rarr;
                    </button>
                </div>
            </div>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="JS/main.js"></script>
    <script src="JS/webcam_words.js"></script>
</body>

</html>
